<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediaCookies</title>
  </head>
  <body>
    <main class="quick-shell" aria-labelledby="product-name">
      <header class="quick-header">
        <div class="quick-meta">
          <div class="brand-lockup">
            <span class="brand-mark"><img src="/icons/icon48.png" alt="" /></span>
            <div>
              <p class="eyebrow">MEDIA COOKIES</p>
              <h1 id="product-name">MediaCookies</h1>
            </div>
          </div>
          <label class="language-control">
            <span class="visually-hidden" data-copy="languageLabel">界面语言</span>
            <select id="language-select" aria-label="界面语言">
              <option value="zh-CN">简体中文</option>
              <option value="en">English</option>
            </select>
          </label>
        </div>
        <p class="quick-tagline" data-copy="quickTagline">为 Media Dock 导出登录状态</p>
      </header>

      <section id="passport" class="passport" data-status="loading" aria-live="polite">
        <div class="passport-heading">
          <div class="passport-label">
            <span class="status-beacon" aria-hidden="true"></span>
            <span data-copy="quickPassportLabel">当前来源通行证</span>
          </div>
          <p id="source-label" class="source-label" data-copy="quickIdentifying">正在识别当前来源…</p>
        </div>
        <div class="passport-copy">
          <h2 id="status-title" data-copy="quickWait">请稍候</h2>
          <p id="status-detail" data-copy="quickPrivacy">检查只在本机进行，不会上传 Cookie。</p>
        </div>
        <div id="trust-row" class="trust-row" aria-label="隐私保护">
          <span data-copy="quickLocalOnly">仅在本机处理</span>
          <span data-copy="quickValueHidden">不显示 Cookie 值</span>
        </div>
      </section>

      <button id="primary-action" class="primary-action" type="button" disabled data-copy="quickChecking">正在检查</button>

      <section class="browser-scan" aria-labelledby="browser-scan-title">
        <div class="browser-scan-heading">
          <span class="scan-orb" aria-hidden="true"></span>
          <div>
            <p class="eyebrow" data-copy="quickBrowserKicker">浏览器来源工作台</p>
            <h2 id="browser-scan-title" data-copy="quickBrowserTitle">识别整个浏览器</h2>
          </div>
        </div>
        <p data-copy="quickBrowserDetail">优先整理 Media Dock 支持的媒体站点；目标网站没出现时，可在工作台查看全部 Cookie 域名。</p>
        <button id="scan-browser" class="scan-browser-action" type="button">
          <span data-copy="quickBrowserAction">授权并扫描媒体站点</span>
          <span aria-hidden="true">↗</span>
        </button>
        <p id="browser-scan-status" class="browser-scan-status" role="status" aria-live="polite" data-copy="quickBrowserPrivacy">只在你点击后申请广泛访问；数据不会上传。</p>
      </section>

      <button id="open-workbench" class="workbench-link" type="button">
        <span data-copy="quickOpenWorkbench">仅打开导出工作台</span>
        <span aria-hidden="true">→</span>
      </button>
    </main>
    <script type="module" src="/src/ui/quick-export/main.ts"></script>
  </body>
</html>
