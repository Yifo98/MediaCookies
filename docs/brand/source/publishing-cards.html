<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediaCookies publishing card</title>
    <style>
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      body {
        position: relative;
        display: grid;
        place-items: center;
        color: #1c2130;
        background:
          radial-gradient(circle at 2% 0%, rgba(29, 196, 240, .18), transparent 34%),
          radial-gradient(circle at 96% 4%, rgba(118, 57, 235, .20), transparent 42%),
          linear-gradient(135deg, #fbf8f1 0%, #f8f4f7 55%, #f4f4ff 100%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .card {
        position: relative;
        z-index: 1;
        display: grid;
        align-items: center;
        width: 88%;
        height: 78%;
        overflow: hidden;
        border: 1px solid rgba(91, 44, 205, .12);
        border-radius: clamp(24px, 4vw, 52px);
        background: rgba(255, 255, 255, .72);
        box-shadow: 0 32px 90px rgba(50, 31, 102, .13);
        backdrop-filter: blur(24px);
      }
      .card::after {
        position: absolute;
        right: 0;
        bottom: 0;
        width: 42%;
        height: 3px;
        background: linear-gradient(90deg, rgba(118, 57, 235, 0), #7639eb 55%, #1dc4f0);
        content: "";
      }
      .identity { display: flex; align-items: center; gap: clamp(22px, 4vw, 58px); padding: 6%; }
      .icon { width: clamp(132px, 20vw, 250px); height: auto; flex: none; filter: drop-shadow(0 20px 32px rgba(82, 36, 184, .18)); }
      .copy { display: grid; gap: clamp(10px, 2vw, 24px); }
      h1 { margin: 0; font-size: clamp(46px, 7vw, 92px); line-height: .95; letter-spacing: -.065em; }
      h1 span { color: #6630d7; }
      .brand-glyph { display: inline-grid; place-items: center; min-width: .92em; height: .92em; margin-left: .16em; border: 1px solid rgba(102, 48, 215, .24); border-radius: .24em; color: #6630d7; font-family: "Songti SC", "STSong", serif; font-size: .66em; letter-spacing: 0; vertical-align: .18em; }
      p { margin: 0; color: #626a78; font-size: clamp(17px, 2.2vw, 30px); line-height: 1.5; }
      .eyebrow { color: #6630d7; font-size: clamp(10px, 1.1vw, 14px); font-weight: 900; letter-spacing: .2em; }
      body.small .card { width: 84%; height: 78%; border-radius: 30px; }
      body.small .identity { justify-content: center; gap: 16px; padding: 20px; }
      body.small .icon { width: 126px; }
      body.small .copy { gap: 8px; }
      body.small h1 { font-size: 26px; line-height: 1; }
      body.small .eyebrow { font-size: 8px; }
      body.small .subtitle { display: none; }
      body.marquee .card { grid-template-columns: 1fr; }
      body.marquee .icon { width: 188px; }
      body.marquee h1 { font-size: 70px; }
      body.marquee .subtitle { max-width: 700px; font-size: 23px; }
      body.social .card { width: 86%; height: 76%; }
      body.readme .card { width: 92%; height: 76%; }
      body.readme .identity { padding: 3.8% 5%; }
      body.readme .icon { width: 164px; }
      body.readme h1 { font-size: 74px; }
      body.readme p { font-size: 22px; }
    </style>
  </head>
  <body>
    <main class="card">
      <section class="identity">
        <img class="icon" src="../assets/icons/qidu-pass-presentation-512.png" alt="" />
        <div class="copy">
          <span class="eyebrow">A QIDU UTILITY</span>
          <h1>Media<span>Cookies</span><span class="brand-glyph">凭</span></h1>
          <p class="subtitle"></p>
        </div>
      </section>
    </main>
    <script>
      const variant = new URLSearchParams(location.search).get('variant') ?? 'social'
      document.body.className = variant
      const subtitle = document.querySelector('.subtitle')
      if (variant === 'social') subtitle.textContent = 'Pass by permission, never beyond the boundary.'
      if (variant === 'readme') subtitle.textContent = '凭以通行，不越边界。 · Local Cookie handoff for Media Dock'
    </script>
  </body>
</html>
