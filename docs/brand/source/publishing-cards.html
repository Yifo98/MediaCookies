<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediaCookies publishing card</title>
    <style>
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      body {
        position: relative;
        display: grid;
        place-items: center;
        color: #293039;
        background:
          radial-gradient(circle at 5% 4%, rgba(99, 194, 203, .26), transparent 37%),
          radial-gradient(circle at 94% 10%, rgba(155, 132, 204, .24), transparent 40%),
          #f7f3eb;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body::before,
      body::after {
        position: absolute;
        border: 1px solid rgba(41, 48, 57, .08);
        border-radius: 50%;
        content: "";
      }
      body::before { right: -10%; bottom: -55%; width: 68%; aspect-ratio: 1; }
      body::after { top: -42%; left: -12%; width: 48%; aspect-ratio: 1; }
      .card {
        position: relative;
        z-index: 1;
        display: grid;
        align-items: center;
        width: 88%;
        height: 78%;
        border: 1px solid rgba(41, 48, 57, .1);
        border-radius: clamp(24px, 4vw, 52px);
        background: rgba(255, 255, 255, .56);
        box-shadow: 0 32px 90px rgba(41, 48, 57, .12);
        backdrop-filter: blur(24px);
      }
      .identity { display: flex; align-items: center; gap: clamp(22px, 4vw, 58px); padding: 6%; }
      .icon { width: clamp(112px, 17vw, 210px); height: auto; flex: none; }
      .copy { display: grid; gap: clamp(10px, 2vw, 24px); }
      h1 { margin: 0; font-size: clamp(46px, 7vw, 92px); line-height: .95; letter-spacing: -.065em; }
      p { margin: 0; color: #65707a; font-size: clamp(17px, 2.2vw, 30px); line-height: 1.5; }
      .eyebrow { color: #4c7d85; font-size: clamp(10px, 1.1vw, 14px); font-weight: 900; letter-spacing: .2em; }
      .route { position: absolute; right: 7%; bottom: 12%; display: flex; align-items: center; gap: 12px; }
      .route span { display: block; width: clamp(9px, 1.5vw, 18px); aspect-ratio: 1; border-radius: 50%; background: #67c2cb; }
      .route span:nth-child(2) { width: clamp(44px, 8vw, 100px); height: 2px; border-radius: 2px; background: rgba(41, 48, 57, .18); }
      .route span:last-child { background: #9b84cc; }
      body.small .card { width: 78%; height: 72%; }
      body.small .identity { justify-content: center; padding: 0; }
      body.small .icon { width: 132px; }
      body.small .copy { display: none; }
      body.small .route { right: 12%; bottom: 16%; }
      body.small .route span { width: 10px; }
      body.small .route span:nth-child(2) { width: 58px; height: 2px; }
      body.marquee .card { grid-template-columns: 1fr; }
      body.marquee .subtitle { display: none; }
      body.social .card { width: 86%; height: 76%; }
      body.readme .card { width: 92%; height: 76%; }
      body.readme .icon { width: 150px; }
      body.readme h1 { font-size: 78px; }
      body.readme p { font-size: 24px; }
    </style>
  </head>
  <body>
    <main class="card">
      <section class="identity">
        <img class="icon" src="../../../icons/icon128.png" alt="" />
        <div class="copy">
          <span class="eyebrow">LOCAL MEDIA PASS</span>
          <h1>MediaCookies</h1>
          <p class="subtitle"></p>
        </div>
      </section>
      <div class="route" aria-hidden="true"><span></span><span></span><span></span></div>
    </main>
    <script>
      const variant = new URLSearchParams(location.search).get('variant') ?? 'social'
      document.body.className = variant
      const subtitle = document.querySelector('.subtitle')
      if (variant === 'social') subtitle.textContent = 'Local Cookie handoff for Media Dock'
      if (variant === 'readme') subtitle.textContent = '为 Media Dock 导出登录状态 · Cookie export for Media Dock'
    </script>
  </body>
</html>
