<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediaCookies store screenshot</title>
    <style>
      * { box-sizing: border-box; }
      html, body { width: 1280px; height: 800px; margin: 0; overflow: hidden; }
      body {
        position: relative;
        display: grid;
        grid-template-columns: 1fr 500px;
        gap: 70px;
        padding: 76px 82px;
        color: #1c2130;
        background:
          radial-gradient(circle at 4% 0%, rgba(29, 196, 240, .18), transparent 28rem),
          radial-gradient(circle at 96% 4%, rgba(118, 57, 235, .20), transparent 32rem),
          linear-gradient(135deg, #fbf8f1 0%, #f8f4f7 58%, #f4f4ff 100%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .copy {
        position: relative;
        z-index: 1;
        display: grid;
        align-content: center;
        gap: 24px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -.02em;
      }
      .brand img { width: 64px; height: 64px; filter: drop-shadow(0 12px 20px rgba(82, 36, 184, .16)); }
      .eyebrow {
        width: max-content;
        border-radius: 999px;
        padding: 9px 13px;
        color: #6630d7;
        background: rgba(118, 57, 235, .10);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: .13em;
      }
      h1 {
        max-width: 640px;
        margin: 0;
        font-size: 58px;
        line-height: 1.08;
        letter-spacing: -.055em;
        white-space: pre-line;
      }
      .subtitle {
        max-width: 570px;
        margin: 0;
        color: #626a78;
        font-size: 20px;
        line-height: 1.65;
      }
      .steps { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
      .steps span {
        border: 1px solid rgba(102, 48, 215, .12);
        border-radius: 999px;
        padding: 9px 13px;
        color: #535c6b;
        background: rgba(255, 255, 255, .68);
        font-size: 13px;
        font-weight: 700;
      }
      .product-stage {
        position: relative;
        z-index: 1;
        display: grid;
        place-items: center;
        overflow: hidden;
        border: 1px solid rgba(102, 48, 215, .12);
        border-radius: 42px;
        background: rgba(255, 255, 255, .72);
        box-shadow: 0 32px 80px rgba(50, 31, 102, .15);
        backdrop-filter: blur(24px);
      }
      .product-stage::after {
        position: absolute;
        right: 0;
        bottom: 0;
        width: 68%;
        height: 3px;
        background: linear-gradient(90deg, rgba(118, 57, 235, 0), #7639eb 55%, #1dc4f0);
        content: "";
      }
      .product-capture {
        display: block;
        width: 360px;
        height: 540px;
        border: 1px solid rgba(28, 33, 48, .08);
        border-radius: 18px;
        box-shadow: 0 18px 48px rgba(50, 31, 102, .22);
      }
      .product-stage[data-kind="workbench"] .product-capture {
        width: 458px;
        height: auto;
        border-radius: 20px;
      }
    </style>
  </head>
  <body>
    <section class="copy">
      <div class="brand"><img src="../../brand/assets/icons/qidu-pass-toolbar-512.png" alt="" />MediaCookies · 凭</div>
      <div id="eyebrow" class="eyebrow"></div>
      <h1 id="headline"></h1>
      <p id="subtitle" class="subtitle"></p>
      <div id="steps" class="steps"></div>
    </section>
    <section class="product-stage">
      <img id="capture" class="product-capture" alt="MediaCookies extension UI" />
    </section>
    <script>
      const shots = {
        ready: {
          lang: 'zh-CN',
          eyebrow: '快速导出',
          headline: '打开媒体页\n一键交给 Media Dock',
          subtitle: '自动识别当前来源，只在需要时申请访问。Media Dock 用户无需理解 Cookie 或 yt-dlp。',
          steps: ['1 · 当前媒体页', '2 · 本地 Cookie 包', '3 · Media Dock'],
          capture: 'captures/popup-ready-zh.png',
        },
        signin: {
          lang: 'zh-CN',
          eyebrow: '清晰状态',
          headline: '状态先说明\n下一步自然就懂',
          subtitle: '“请先登录”直接告诉你该做什么。没有登录状态时，不会生成无效导出包。',
          steps: ['可以导出', '请先登录', '可能失效', '当前网页不支持'],
          capture: 'captures/popup-signin-zh.png',
        },
        exported: {
          lang: 'en',
          eyebrow: 'LOCAL HANDOFF',
          headline: 'From a signed-in page\nto Media Dock',
          subtitle: 'A compatible Cookie package stays on your device, ready for Media Dock import.',
          steps: ['Current source', 'Local Cookie package', 'Media Dock'],
          capture: 'captures/popup-exported-en.png',
          kind: 'popup',
        },
        workbenchZh: {
          lang: 'zh-CN',
          eyebrow: '导出工作台',
          headline: '专业能力收进工作台\nMedia Dock 用户不必先学 Cookie',
          subtitle: '扫描范围、登录状态与安全预览分开表达；只有需要诊断时，才进入高级流程。',
          steps: ['媒体站点（推荐）', '全部 Cookie 域名', '安全预览'],
          capture: 'captures/workbench-zh.png',
          kind: 'workbench',
        },
        safePreview: {
          lang: 'en',
          eyebrow: 'SAFE PREVIEW',
          headline: 'Useful diagnostics\nwithout exposing values',
          subtitle: 'Review domains, names, expiry status and security flags. Cookie values never enter the table.',
          steps: ['Domain', 'Status', 'Security flags', 'No Cookie values'],
          capture: 'captures/workbench-en.png',
          kind: 'workbench',
        },
      }
      const selected = shots[new URLSearchParams(location.search).get('shot')] ?? shots.ready
      document.documentElement.lang = selected.lang
      document.getElementById('eyebrow').textContent = selected.eyebrow
      document.getElementById('headline').textContent = selected.headline
      document.getElementById('subtitle').textContent = selected.subtitle
      document.getElementById('capture').src = selected.capture
      document.querySelector('.product-stage').dataset.kind = selected.kind ?? 'popup'
      selected.steps.forEach((label) => {
        const span = document.createElement('span')
        span.textContent = label
        document.getElementById('steps').append(span)
      })
    </script>
  </body>
</html>
